<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Dark background -->
  <rect width="32" height="32" rx="7" fill="#0d0d0d"/>
  <!-- Agent network: center node (orchestrator) -->
  <circle cx="16" cy="16" r="4" fill="#ef4444"/>
  <!-- Connecting lines to sub-agents -->
  <line x1="16" y1="12" x2="16" y2="6" stroke="#ef4444" stroke-width="1" opacity="0.5"/>
  <line x1="19.5" y1="18.5" x2="25" y2="23" stroke="#ef4444" stroke-width="1" opacity="0.5"/>
  <line x1="12.5" y1="18.5" x2="7" y2="23" stroke="#ef4444" stroke-width="1" opacity="0.5"/>
  <!-- Sub-agent nodes -->
  <circle cx="16" cy="5" r="2.5" fill="#1a1a1a" stroke="#ef4444" stroke-width="1.2"/>
  <circle cx="26" cy="24" r="2.5" fill="#1a1a1a" stroke="#ef4444" stroke-width="1.2"/>
  <circle cx="6" cy="24" r="2.5" fill="#1a1a1a" stroke="#ef4444" stroke-width="1.2"/>
  <!-- Inner dot of sub-agents -->
  <circle cx="16" cy="5" r="1" fill="#ef4444" opacity="0.7"/>
  <circle cx="26" cy="24" r="1" fill="#ef4444" opacity="0.7"/>
  <circle cx="6" cy="24" r="1" fill="#ef4444" opacity="0.7"/>
  <!-- Center glow -->
  <circle cx="16" cy="16" r="4" fill="none" stroke="#ef4444" stroke-width="1" opacity="0.4"/>
</svg>
