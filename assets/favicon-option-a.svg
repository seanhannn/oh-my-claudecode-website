<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Dark rounded square background -->
  <rect width="32" height="32" rx="7" fill="#0d0d0d"/>
  <!-- Red glow ring -->
  <rect width="32" height="32" rx="7" fill="none" stroke="#ef4444" stroke-width="1.5" opacity="0.6"/>
  <!-- "OMC" text -->
  <text x="16" y="13.5" font-family="'SF Mono', 'Fira Code', monospace" font-weight="700" font-size="6.5" fill="#ef4444" text-anchor="middle" letter-spacing="0.5">OMC</text>
  <!-- Pulsing green dot (active indicator) -->
  <circle cx="22" cy="22" r="2.5" fill="#22c55e" opacity="0.9"/>
  <!-- Terminal cursor line -->
  <line x1="6" y1="22" x2="18" y2="22" stroke="#ef4444" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <!-- Small agent nodes -->
  <circle cx="8" cy="26" r="1.2" fill="#ef4444" opacity="0.7"/>
  <circle cx="13" cy="26" r="1.2" fill="#ef4444" opacity="0.5"/>
  <circle cx="18" cy="26" r="1.2" fill="#ef4444" opacity="0.3"/>
</svg>
